const getToday=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const getLevel=t=>{let c=LEVELS[0];for(const l of LEVELS){if(t>=l.min)c=l;}return c;};
const getNextLevel=t=>{for(const l of LEVELS){if(t<l.min)return l;}return null;};

const getFDM=(y,m)=>new Date(y,m,1).getDay();
const INIT={entries:{},startDate:getToday(),totalDays:0,currentStreak:0,maxStreak:0,earlyBird:false,nightOwl:false,comeback:false,isPremium:false,groupId:null,groupName:null};

// === Data Layer (localStorage + Firebase) ===
const DataService = {
  async loadUser(userId) {
    const local = localStorage.getItem("bc-"+userId);
    let data = local ? JSON.parse(local) : null;
    if (db) {
      try {
        const doc = await db.collection("users").doc(userId).get();
        if (doc.exists) {
          const fbData = doc.data();
          if (!data || (fbData.totalDays||0) >= (data.totalDays||0)) data = fbData;
        }
      } catch(e) {}
    }
    return data || INIT;
  },
  async saveUser(userId, data, userInfo) {
    localStorage.setItem("bc-"+userId, JSON.stringify(data));
    if (db) {
      try {
        await db.collection("users").doc(userId).set({
          ...data, name: userInfo.name, picture: userInfo.picture, email: userInfo.email, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge:true});
      } catch(e) {}
    }
  },
  async getLeaderboard(groupId) {
    if (!db) return [];
    try {
      let q = db.collection("users").orderBy("totalDays","desc").limit(20);
      if (groupId) q = db.collection("users").where("groupId","==",groupId).orderBy("totalDays","desc").limit(20);
      const snap = await q.get();
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    } catch(e) { return []; }
  },
  async joinGroup(userId, groupId, groupName) {
    if (db) {
      try {
        await db.collection("users").doc(userId).update({groupId, groupName});
        await db.collection("groups").doc(groupId).set({name:groupName, updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      } catch(e) {}
    }
  },
  async getGroups() {
    if (!db) return [];
    try {
      const snap = await db.collection("groups").orderBy("updatedAt","desc").limit(20).get();
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    } catch(e) { return []; }
  },
  exportData(data) {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "blog-challenge-backup-"+getToday()+".json"; a.click();
    URL.revokeObjectURL(url);
  },
  importData(file) {
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = e => { try { resolve(JSON.parse(e.target.result)); } catch(err) { reject(err); } };
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }
};

function generateShareCard(data, userName) {

  const grd=ctx.createLinearGradient(0,0,w,0);grd.addColorStop(0,"#D4756B");grd.addColorStop(1,"#E88FAD");
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,8);ctx.fillRect(0,h-8,w,8);

  ctx.fillStyle="#e8dcc8";ctx.font="bold 48px 'Noto Sans KR',sans-serif";ctx.textAlign="center";

  ctx.font="24px 'Noto Sans KR',sans-serif";ctx.fillStyle="#8b7e6a";

  // level name
  ctx.font="bold 44px 'Noto Sans KR',sans-serif";ctx.fillStyle=lv.color;
  ctx.fillText(lv.name,w/2,410);
  // stats
  ctx.font="bold 80px 'Noto Serif KR',serif";ctx.fillStyle="#e8dcc8";

  ctx.font="20px 'Noto Sans KR',sans-serif";ctx.fillStyle="#8b7e6a";
  ctx.fillText("총 작성일",w/2,575);
  // streak
  ctx.font="bold 36px 'Noto Sans KR',sans-serif";ctx.fillStyle="#D4756B";
  ctx.fillText("🔥 "+data.currentStreak+"일 연속  ⚡ 최고 "+data.maxStreak+"일",w/2,660);
  // badges
  const earned=BADGES.filter(b=>b.check(data));
  ctx.font="40px sans-serif";
  earned.forEach((b,i)=>{ctx.fillText(b.emoji,340+i*56,740);});
  // branding
  ctx.fillStyle=grd;ctx.fillRect(140,820,800,2);
  ctx.font="bold 22px 'Noto Sans KR',sans-serif";ctx.fillStyle="#8b7e6a";
  ctx.fillText("AI콘텐츠마케팅연구소 유쌤클래스",w/2,880);
  ctx.font="16px 'Noto Sans KR',sans-serif";ctx.fillStyle="#5a4f3f";
  ctx.fillText("친절한유성쌤과 함께하는 블로그 글쓰기 챌린지",w/2,910);
  ctx.fillText(getToday(),w/2,940);
  // download
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="challenge-"+getToday()+".png";a.click();
    URL.revokeObjectURL(url);
  });
}

          <h3 className="section-title">요일별 패턴</h3>
          <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>
            {["일","월","화","수","목","금","토"].map((d,di)=>{let cnt=0;Object.keys(data.entries).forEach(k=>{if(new Date(k).getDay()===di)cnt++;});const mx=Math.max(...[0,1,2,3,4,5,6].map(idx=>{let c=0;Object.keys(data.entries).forEach(k=>{if(new Date(k).getDay()===idx)c++;});return c;}),1);return<div key={di} style={{flex:1,textAlign:"center"}}><div style={{height:70,display:"flex",alignItems:"flex-end",justifyContent:"center",marginBottom:4}}><div style={{width:"65%",height:(cnt/mx*100)+"%",background:"linear-gradient(to top,#D4756B,#E88FAD)",borderRadius:3,minHeight:cnt>0?3:0}}/></div><p className="text-xs">{d}</p><p style={{fontSize:11,fontWeight:700,marginTop:1}}>{cnt}</p></div>;})}
          </div>
        </div>
        <div className="card">
          <h3 className="section-title">성장 레벨</h3>
          {LEVELS.map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<LEVELS.length-1?"1px solid #3d342920":"none",opacity:data.totalDays>=l.min?1:.4}}><span style={{fontSize:24}}>{l.emoji}</span><div style={{flex:1}}><p style={{fontSize:13,fontWeight:600,color:data.totalDays>=l.min?l.color:"#5a4f3f"}}>{l.name}</p><p className="text-xs">{l.min}일 이상</p></div>{data.totalDays>=l.min&&<span style={{color:"#6B8E4E",fontSize:14}}>✓</span>}</div>)}
        </div>
      </div>}

      </div>

      {/* TAB BAR */}
      <div className="tab-bar">
        <div className="tab-bar-inner">
          {[{id:"home",icon:"🏠",label:"홈"},{id:"topics",icon:"💡",label:"AI코칭"},{id:"rank",icon:"🏆",label:"랭킹"},{id:"stats",icon:"📊",label:"통계"}].map(n=><button key={n.id} className={"tab-btn"+(view===n.id?" active":"")} onClick={()=>{setView(n.id);if(n.id==="rank")loadLeaderboard();}}>
            <span className="icon">{n.icon}</span><span className="label">{n.label}</span>
          </button>)}
        </div>
        <p style={{textAlign:"center",fontSize:8,color:"#3d3429",marginTop:4}}>Made by AI콘텐츠마케팅연구소 유쌤클래스</p>
      </div>
    </div>
  );
}

// ===== ROOT =====
function App(){
  const[user,setUser]=useState(()=>{try{const r=localStorage.getItem("bc-user");return r?JSON.parse(r):null;}catch(e){return null;}});
  const login=u=>{setUser(u);localStorage.setItem("bc-user",JSON.stringify(u));};
  const logout=()=>{setUser(null);localStorage.removeItem("bc-user");};
  if(!user)return<LoginScreen onLogin={login}/>;
  return<ChallengeApp user={user} onLogout={logout}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
