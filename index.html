/* ===== LOGIN SCREEN ===== */
function LoginScreen({onLogin}){
  const btnRef=useRef(null);
  const[ready,setReady]=useState(false);
  useEffect(()=>{
    let a=0;const tryInit=()=>{
      if(window.google&&window.google.accounts){
        window.google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:r=>{const p=decodeJwt(r.credential);if(p)onLogin({id:p.sub,name:p.name,email:p.email,picture:p.picture});}});
        setReady(true);
        if(btnRef.current)window.google.accounts.id.renderButton(btnRef.current,{type:"standard",theme:"filled_black",size:"large",text:"signin_with",shape:"pill",width:300,locale:"ko"});
      }else if(a<50){a++;setTimeout(tryInit,200);}
    };tryInit();
  },[]);

    <div style={{minHeight:"100vh",background:"#1a1612",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

function ChallengeApp({user,onLogout}){
  const SK="blog-challenge-"+user.id;
  const[data,setData]=useState(()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):INIT;}catch(e){return INIT;}});
  const[view,setView]=useState("home");
  const[calM,setCalM]=useState(new Date().getMonth());
  const[calY,setCalY]=useState(new Date().getFullYear());
  const[showChk,setShowChk]=useState(false);
  const[note,setNote]=useState("");
  const[url,setUrl]=useState("");
  const[topicOpen,setTopicOpen]=useState(null);
  const[aiLoad,setAiLoad]=useState(false);
  const[aiText,setAiText]=useState("");
  const[custTopic,setCustTopic]=useState("");
  const[celeb,setCeleb]=useState(null);
  const[selDay,setSelDay]=useState(null);
  const[showProf,setShowProf]=useState(false);
  const save=nd=>{setData(nd);try{localStorage.setItem(SK,JSON.stringify(nd));}catch(e){}};
  const calcStreak=entries=>{let s=0;const d=new Date();while(true){const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");if(entries[k]){s++;d.setDate(d.getDate()-1);}else if(s===0){d.setDate(d.getDate()-1);const k2=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");if(entries[k2]){s++;d.setDate(d.getDate()-1);}else break;}else break;}return s;};

          <div style={{background:"#252017",borderRadius:20,padding:20,marginBottom:20,border:"1px solid #3d342920"}}><h3 style={{fontFamily:"'Noto Serif KR',serif",fontSize:15,marginBottom:16}}>월별 작성 현황</h3>{(()=>{const ms=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const y=d.getFullYear(),m=d.getMonth(),dm=getDIM(y,m);let cnt=0;for(let day=1;day<=dm;day++){if(data.entries[y+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0")])cnt++;}ms.push({l:(m+1)+"월",c:cnt,t:dm});}const mx=Math.max(...ms.map(m=>m.c),1);return ms.map((m,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}><span style={{fontSize:12,color:"#8b7e6a",width:30,textAlign:"right"}}>{m.l}</span><div style={{flex:1,height:20,background:"#1a1612",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",width:(m.c/mx*100)+"%",background:"linear-gradient(90deg,#D4756B,#E88FAD)",borderRadius:6,transition:"width .5s",minWidth:m.c>0?4:0}}/></div><span style={{fontSize:12,color:"#8b7e6a",width:50,textAlign:"right"}}>{m.c}/{m.t}</span></div>);})()}</div>
          <div style={{background:"#252017",borderRadius:20,padding:20,marginBottom:20,border:"1px solid #3d342920"}}><h3 style={{fontFamily:"'Noto Serif KR',serif",fontSize:15,marginBottom:16}}>요일별 패턴</h3><div style={{display:"flex",gap:8,justifyContent:"space-between"}}>{["일","월","화","수","목","금","토"].map((d,di)=>{let cnt=0;Object.keys(data.entries).forEach(k=>{if(new Date(k).getDay()===di)cnt++;});const mx=Math.max(...[0,1,2,3,4,5,6].map(idx=>{let c=0;Object.keys(data.entries).forEach(k=>{if(new Date(k).getDay()===idx)c++;});return c;}),1);return<div key={di} style={{flex:1,textAlign:"center"}}><div style={{height:80,display:"flex",alignItems:"flex-end",justifyContent:"center",marginBottom:6}}><div style={{width:"70%",height:(cnt/mx*100)+"%",background:"linear-gradient(to top,#D4756B,#E88FAD)",borderRadius:4,minHeight:cnt>0?4:0}}/></div><p style={{fontSize:11,color:"#8b7e6a"}}>{d}</p><p style={{fontSize:12,fontWeight:700,marginTop:2}}>{cnt}</p></div>;})}</div></div>
          <div style={{background:"#252017",borderRadius:20,padding:20,border:"1px solid #3d342920"}}><h3 style={{fontFamily:"'Noto Serif KR',serif",fontSize:15,marginBottom:16}}>성장 레벨</h3>{LEVELS.map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<LEVELS.length-1?"1px solid #3d342920":"none",opacity:data.totalDays>=l.min?1:.4}}><span style={{fontSize:28}}>{l.emoji}</span><div style={{flex:1}}><p style={{fontSize:14,fontWeight:600,color:data.totalDays>=l.min?l.color:"#5a4f3f"}}>{l.name}</p><p style={{fontSize:11,color:"#5a4f3f"}}>{l.min}일 이상</p></div>{data.totalDays>=l.min&&<span style={{color:"#6B8E4E",fontSize:16}}>✓</span>}</div>)}</div>
        </div>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"linear-gradient(to top,#1a1612 70%,transparent)",padding:"20px 0 8px",zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",padding:"0 20px"}}>{[{id:"home",icon:"🏠",label:"홈"},{id:"topics",icon:"💡",label:"주제추천"},{id:"stats",icon:"📊",label:"통계"}].map(n=><button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?"#3d3429":"none",border:"none",borderRadius:14,padding:"10px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",transition:"all .2s"}}><span style={{fontSize:22}}>{n.icon}</span><span style={{fontSize:10,color:view===n.id?"#e8dcc8":"#5a4f3f",fontWeight:view===n.id?700:400}}>{n.label}</span></button>)}</div>
        <p style={{textAlign:"center",fontSize:9,color:"#3d3429",marginTop:6}}>Made by AI콘텐츠마케팅연구소 유쌤클래스</p>
      </div>
    </div>
  );
}

/* ===== ROOT ===== */
function App(){
  const[user,setUser]=useState(()=>{try{const r=localStorage.getItem("blog-challenge-user");return r?JSON.parse(r):null;}catch(e){return null;}});
  const login=u=>{setUser(u);try{localStorage.setItem("blog-challenge-user",JSON.stringify(u));}catch(e){}};
  const logout=()=>{setUser(null);try{localStorage.removeItem("blog-challenge-user");}catch(e){}};
  if(!user)return<LoginScreen onLogin={login}/>;
  return<ChallengeApp user={user} onLogout={logout}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
